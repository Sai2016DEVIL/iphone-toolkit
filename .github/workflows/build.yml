name: Build SimpleiPhoneToolkit

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained exe
        run: |
          dotnet publish ./iPhoneToolkit.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleiPhoneToolkit-exe
          path: publish/SimpleiPhoneToolkit.exe

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleiPhoneToolkit-Setup
          path: installer/output/SimpleiPhoneToolkit-Setup.exe
